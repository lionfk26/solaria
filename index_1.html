<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Games</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --accent: #7c5cff;
    --accent2: #ff5c93;
    --text: #f2f2f7;
    --muted: #9a9ab0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 20% 20%, #1c1f2e, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 60px 20px 30px;
    text-align: center;
  }
  header h1 {
    font-size: 2.6rem;
    margin: 0 0 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p {
    color: var(--muted);
    margin: 0;
  }
  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid #2a2e40;
    border-radius: 14px;
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }
  .emoji { font-size: 2.2rem; }
  .card h2 { margin: 0; font-size: 1.15rem; }
  .card p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 40px 20px;
  }
  code {
    background: #22263a;
    padding: 2px 6px;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <header>
    <h1>🎲 My Games</h1>
    <p>A little arcade of things I've built</p>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">
      No games yet — add one to <code>games/</code> and list it in <code>games.json</code>.
    </div>
  </main>
  <footer>Hosted with GitHub Pages</footer>

  <script>
    fetch('games.json')
      .then(r => r.json())
      .then(games => {
        const grid = document.getElementById('grid');
        const empty = document.getElementById('empty');
        if (!games.length) {
          empty.style.display = 'block';
          return;
        }
        games.forEach(game => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = 'games/' + game.file;
          a.innerHTML = `
            <div class="emoji">${game.emoji || '🕹️'}</div>
            <h2>${game.title}</h2>
            <p>${game.description || ''}</p>
          `;
          grid.appendChild(a);
        });
      })
      .catch(() => {
        document.getElementById('empty').style.display = 'block';
      });
  </script>
</body>
</html>
